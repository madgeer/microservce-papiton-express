apiVersion: apps/v1
kind: Deployment

metadata:
  name: shipping-service-deployment
  labels:
    app: shipping-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: shipping-service

  template:
    metadata:
      labels:
        app: shipping-service

    spec:
      containers:
      - name: shipping-service
        image: dickaf/shipping-service:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8080