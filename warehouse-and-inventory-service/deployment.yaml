apiVersion: apps/v1
kind: Deployment
metadata:
  name: warehouse-deployment
  labels:
    app: warehouse-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warehouse-service
  template:
    metadata:
      labels:
        app: warehouse-service
    spec:
      containers:
      - name: warehouse-container
        image: madgeer/papiton-warehouse-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: warehouse-service
spec:
  type: NodePort
  selector:
    app: warehouse-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
