# --- WAREHOUSE SERVICE ---
apiVersion: v1
kind: Service
metadata:
  name: warehouse-app
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: warehouse-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: warehouse-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warehouse-app
  template:
    metadata:
      labels:
        app: warehouse-app
    spec:
      containers:
      - name: warehouse-app
        image: papitonregistry.azurecr.io/warehouse-and-inventory-service:v1
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: "warehouse-db"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "postgres"
        - name: DB_NAME
          value: "papiton_warehouse"
        - name: DB_PORT
          value: "5432"
        - name: KAFKA_BROKER
          value: "kafka:9092"

# --- SHIPPING SERVICE ---
