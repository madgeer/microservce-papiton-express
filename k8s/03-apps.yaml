# --- ETL PIPELINE SERVICE ---
---
apiVersion: v1
kind: Service
metadata:
  name: etl-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8085
  selector:
    app: etl-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etl-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etl-service
  template:
    metadata:
      labels:
        app: etl-service
    spec:
      containers:
      - name: etl-service
        image: papitonregistry.azurecr.io/etl-pipeline:v1
        ports:
        - containerPort: 8085
        env:
        - name: KAFKA_BROKER
          value: "kafka:9092"
        - name: ORDER_DB_URL
          value: "postgresql://postgres:admin123@order-db:5432/papiton_order_tariff_service_db"
        - name: SHIPPING_DB_URL
          value: "postgresql://user:password@shipping-db:5432/shipping_test_db"
        - name: WAREHOUSE_DB_URL
          value: "postgresql://postgres:postgres@warehouse-db:5432/papiton_warehouse"
        - name: DWH_DB_URL
          value: "postgresql://postgres:dwhpassword@dwh-db:5432/papiton_dwh"
        - name: MONGO_URI
          value: "mongodb://tracking-mongo:27017"
        - name: MONGO_DB_NAME
          value: "tracking_db"
        - name: ORDER_SERVICE_URL
          value: "http://order-app:80"
        - name: SHIPPING_SERVICE_URL
          value: "http://shipping-app:80"
        - name: WAREHOUSE_SERVICE_URL
          value: "http://warehouse-app:80"
        - name: TRACKING_SERVICE_URL
          value: "http://tracking-app:80"
        - name: ETL_WORKERS
          value: "4"
