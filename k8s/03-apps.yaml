# --- ORDER & TARIFF SERVICE ---
---
apiVersion: v1
kind: Service
metadata:
  name: order-app
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: order-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-app
  template:
    metadata:
      labels:
        app: order-app
    spec:
      containers:
      - name: order-app
        image: papitonregistry.azurecr.io/order-tariff-service:v1
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: "order-db"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "admin123"
        - name: DB_NAME
          value: "papiton_order_tariff_service_db"
        - name: DB_PORT
          value: "5432"
        - name: REDIS_HOST
          value: "order-redis"
        - name: REDIS_PORT
          value: "6379"
        - name: KAFKA_BROKER
          value: "kafka:9092"

