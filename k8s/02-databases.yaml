# --- SHIPPING MONGO ---
---
apiVersion: v1
kind: Service
metadata:
  name: shipping-mongo
spec:
  ports:
  - port: 27017
  selector:
    app: shipping-mongo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipping-mongo
  template:
    metadata:
      labels:
        app: shipping-mongo
    spec:
      containers:
      - name: mongo
        image: mongo:6-jammy
        ports:
        - containerPort: 27017

