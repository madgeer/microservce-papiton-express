# --- WAREHOUSE DB ---
apiVersion: v1
kind: Service
metadata:
  name: warehouse-db
spec:
  ports:
  - port: 5432
  selector:
    app: warehouse-db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: warehouse-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warehouse-db
  template:
    metadata:
      labels:
        app: warehouse-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgres"
        - name: POSTGRES_DB
          value: "papiton_warehouse"

